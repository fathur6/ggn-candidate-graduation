<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Dashboard Test</title>
</head>
<body>
    <div id="statusMessage" style="padding: 20px; font-family: sans-serif; color: #333;">Memuatkan data ujian...</div>
    <div id="result" style="padding: 20px; font-family: monospace; white-space: pre-wrap; background: #f0f0f0; margin: 20px;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const statusMessage = document.getElementById('statusMessage');
            const resultDiv = document.getElementById('result');
            statusMessage.innerText = 'Memanggil Google Apps Script...';

            google.script.run
                .withSuccessHandler(res => {
                    statusMessage.innerText = 'Panggilan berjaya!';
                    resultDiv.innerText = JSON.stringify(res, null, 2);
                })
                .withFailureHandler(err => {
                    statusMessage.innerText = 'Panggilan gagal!';
                    resultDiv.innerText = JSON.stringify(err, null, 2);
                })
                .getPostgraduateData();
        });
    </script>
</body>
</html>
